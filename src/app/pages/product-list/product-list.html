<div class="container products-page">
  <div class="page-header text-center">
    <h2>Nos Produits</h2>
    <p>Parcourez notre catalogue complet de produits numériques et physiques</p>
  </div>

  <div class="filters-bar">
    <button class="btn-outline active">Tous</button>
    <button class="btn-outline">Numériques</button>
    <button class="btn-outline">Physiques</button>
  </div>

  <div class="products-grid">
    @for (product of products; track product.id) {
    <div class="product-card glass-panel" [routerLink]="['/product', product.id]">
      <div class="badges">
        @if (product.product_type === 'DIGITAL') {
        <span class="badge digital">Numérique</span>
        }
      </div>
      <img [src]="product.image" [alt]="product.title">
      <div class="product-info">
        <h3>{{product.title}}</h3>
        <p class="category">{{product.category?.name}}</p>
        <div class="price-row">
          <span class="price">{{product.price}} FCFA</span>
          <button class="add-to-cart" (click)="addToCart($event, product)">+</button>
        </div>
      </div>
    </div>
    } @empty {
    <p>Aucun produit disponible.</p>
    }
  </div>
</div>
